<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   viewBox="0 0 [w] [h]"
   width="[w]mm"
   height="[h]mm"
   style="background-color: #bbbbbb;">
    <style>   
    .l {
      fill:#cccccc;
      stroke:#000000;
      stroke-width:0.02;
    }
    .l1 {
      fill:none;
      stroke:#000000;
      stroke-width:0.02;
    }
    .l2 {
      fill:none;
      stroke:#000000;
      stroke-width:0.08;
    }
    .l3 {
      fill:none;
      stroke:green;
      stroke-width:0.08;
    }
    </style> 
    [bgString]
<!-- wheel mount -->
    <path class="[class]" d="[path1]" />
<!-- sprocket mount -->
    <path class="[class]" d="[path2]" />
<!-- sprocket guides -->
    <path class="[class]" d="[path3]" />
<!-- rear fork extension -->
    <path class="[class]" d="[path4]" />
<!-- rear fork extension brake -->
    <!--<ellipse class="l3" cx="[ecx]" cy="[ecy]" rx="[smallR]" ry="[bigR]" />
    <ellipse class="l3" cx="[ecx]" cy="[ecy]" rx="[smallR]" ry="[bigR]" transform="rotate([rotateAngle] [ecx] [ecy])" />
    <rect width="100%" height="100%" fill="#dddddd" />-->
    <path class="[class]" d="[path5]" />    
<!-- front fork extension -->
    <path class="[class]" d="[path5_1]" />
<!-- plate big -->
    <path class="[class]" transform="translate([tr1x], 0)" d="[path6] [path7] [path8] [path9]" />
<!-- border big -->
    <path class="[class]" transform="translate([tr1x], 0)" d="[path6] [path10]" />
<!-- plate small -->    
    <path class="[class]" transform="translate([tr2x], 0)" d="[path11] [path12]" />
<!-- border small -->
    <path class="[class]" transform="translate([tr2x], 0)" d="[path11] [path13]" />
<!-- support1 -->
    <path class="[class]" d="[support1]" />
<!-- support2 -->
    <path class="[class]" d="[support2]" />
<!-- support3 -->
    <path class="[class]" d="[support3]" />
<!-- support4 -->
    <path class="[class]" transform="translate([tr3x], [tr3y])" d="[support4]" />
<!-- support5 -->
    <path class="[class]" transform="translate([tr4x], [tr4y])" d="[support5]" />
<!-- aligner -->
    <path class="[class]" d="[holeLines]" />
    <path class="[class]" d="[aligner]" />
<!-- 3 holes -->
    <path class="[class]" transform="translate([tr5x], [tr5y])" d="[path14]" />
<!-- rear washer -->
    <path class="[class]" d="[path15]" />
<!-- battery lock -->
    <path class="[class]" d="[path16]" />
<!-- rear fender mount -->
    <path class="[class]" d="[path17]" />
<!-- L-plate1 -->
    <path class="[class]" d="[path18]" />
<!-- L-plate2 -->
    <path class="[class]" d="[path19]" />
<!-- pi cover -->
    <path class="[class2]" d="[path20]" />
<!---->
</svg>