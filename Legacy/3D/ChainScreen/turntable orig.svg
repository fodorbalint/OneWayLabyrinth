<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns="http://www.w3.org/2000/svg"
   viewBox="0 0 [w] [h]"
   width="[w]mm"
   height="[h]mm"
   style="background-color: #bbbbbb;">
    <style>   
    .l1 {
      fill:none;
      stroke:#000000;
      stroke-width:0.02;
    }
    .l2 {
      fill:none;
      stroke:#000000;
      stroke-width:0.2;
    }
    </style> 
    [bgString]
    [outline]
<!-- bearing 1 -->
    <path class="[class]" transform="translate([t1x], [t1y])" d="[path1]" />
<!-- bearing 2 -->
    <path class="[class]" transform="translate([t2x], [t2y])" d="[path2]" />
<!-- bearing 3 -->
    <path class="[class]" transform="translate([t3x], [t3y])" d="[path3]" />
<!-- bearing 4 -->
    <path class="[class]" transform="translate([t4x], [t4y])" d="[path4]" />
<!-- bearing 5 -->
    <path class="[class]" transform="translate([t5x], [t5y])" d="[path5]" />
<!-- bearing 6 -->
    <path class="[class]" transform="translate([t6x], [t6y])" d="[path6]" />
<!-- bearing 7 -->
    <path class="[class]" transform="translate([t7x], [t7y])" d="[path7]" />
<!-- crankbox 1 -->
    <path class="[class]" transform="translate([t8x], [t8y])" d="[path8]" />
<!-- crankbox 2 -->
    <path class="[class]" transform="translate([t9x], [t9y])" d="[path9]" />
<!-- sawblade gasket -->
    <path class="[class]" transform="translate([t10x], [t10y])" d="[path10]" />
<!---->
</svg>